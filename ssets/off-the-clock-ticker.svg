<svg viewBox="0 0 1400 200" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <linearGradient id="bg" x1="-20%" y1="0%" x2="80%" y2="0%" spreadMethod="reflect">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="50%" stop-color="#8B0000"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
      <animate attributeName="x1" values="-20%;120%;-20%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="80%;220%;80%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1400" height="200" fill="url(#bg)"/>

  <line x1="0" y1="172" x2="1400" y2="172" stroke="#E63946" stroke-width="2" stroke-dasharray="20 14" opacity="0.55">
    <animate attributeName="stroke-dashoffset" values="0;-340" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- headphones, fixed position, flowing notes -->
  <g transform="translate(480,58)">
    <path d="M-22,10 A22,22 0 0,1 22,10" fill="none" stroke="#FFFFFF" stroke-width="3"/>
    <rect x="-27" y="8" width="10" height="16" rx="3" fill="#E63946"/>
    <rect x="17" y="8" width="10" height="16" rx="3" fill="#E63946"/>
    <text x="-5" y="0" font-size="16" fill="#E63946" opacity="0.9">♪
      <animate attributeName="y" values="0;-32" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="2.2s" repeatCount="indefinite"/>
    </text>
    <text x="10" y="4" font-size="12" fill="#FFFFFF" opacity="0.8">♫
      <animate attributeName="y" values="4;-26" dur="2.6s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="2.6s" begin="0.6s" repeatCount="indefinite"/>
    </text>
    <text x="-15" y="6" font-size="10" fill="#E63946" opacity="0.7">♪
      <animate attributeName="y" values="6;-20" dur="1.8s" begin="1.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="1.8s" begin="1.1s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- camera, fixed position, flowing shutter ripples -->
  <g transform="translate(900,68)">
    <rect x="-24" y="-10" width="48" height="30" rx="4" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
    <rect x="-10" y="-18" width="16" height="8" rx="2" fill="#FFFFFF"/>
    <circle r="9" cy="5" fill="none" stroke="#E63946" stroke-width="2.5"/>
    <circle r="9" cy="5" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7">
      <animate attributeName="r" values="9;30" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="9" cy="5" fill="none" stroke="#E63946" stroke-width="1.5" opacity="0.7">
      <animate attributeName="r" values="9;30" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="2.4s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- motorcycle, rides across the whole banner, wheels spin -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="-120,0; 1520,0" dur="14s" repeatCount="indefinite"/>
    <g transform="translate(0,150)">
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.35s" repeatCount="indefinite"/>
        <circle r="13" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <line x1="-13" y1="0" x2="13" y2="0" stroke="#FFFFFF" stroke-width="1"/>
        <line x1="0" y1="-13" x2="0" y2="13" stroke="#FFFFFF" stroke-width="1"/>
      </g>
      <g transform="translate(66,0)">
        <animateTransform attributeName="transform" type="rotate" from="0 66 0" to="360 66 0" dur="0.35s" repeatCount="indefinite"/>
        <circle r="13" fill="none" stroke="#FFFFFF" stroke-width="2"/>
        <line x1="-13" y1="0" x2="13" y2="0" stroke="#FFFFFF" stroke-width="1"/>
        <line x1="0" y1="-13" x2="0" y2="13" stroke="#FFFFFF" stroke-width="1"/>
      </g>
      <path d="M13,-6 L40,-30 L58,-30 L66,-6 M40,-30 L40,-42 M40,-42 L52,-46 M22,-14 L48,-14"
            stroke="#E63946" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
