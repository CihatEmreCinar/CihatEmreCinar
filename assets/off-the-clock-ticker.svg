<svg viewBox="0 0 1400 200" xmlns="http://www.w3.org/2000/svg" width="100%">
  <defs>
    <linearGradient id="bg" x1="-30%" y1="-30%" x2="70%" y2="70%" spreadMethod="reflect">
      <stop offset="0%"   stop-color="#0A0A0A"/>
      <stop offset="35%"  stop-color="#8B0000"/>
      <stop offset="65%"  stop-color="#E63946"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
      <animate attributeName="x1" values="-30%;130%;-30%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="-30%;130%;-30%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="70%;230%;70%" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="70%;230%;70%" dur="8s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1400" height="200" fill="url(#bg)"/>
</svg>
